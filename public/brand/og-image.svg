        font-weight="600"
        font-size="84"
        letter-spacing="-2.5"
        fill="#FAF7F0">at the speed of</text>
  <text x="80" y="520"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="600"
        font-size="84"
        letter-spacing="-2.5"
        fill="#E8552A">Solana.</text>

  <text x="80" y="580"
